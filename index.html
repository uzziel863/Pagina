 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡ALERTA DE SEGURIDAD! Sistema Comprometido</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        /* Pantalla de Cebo */
        .scare-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a1111 0%, #070202 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            cursor: pointer;
        }

        .alert-icon {
            width: 80px;
            height: 80px;
            background-color: #e81123;
            color: white;
            font-size: 50px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(232, 17, 35, 0.6);
            margin-bottom: 25px;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(232, 17, 35, 0.6); }
            50% { transform: scale(1.08); box-shadow: 0 0 50px rgba(232, 17, 35, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(232, 17, 35, 0.6); }
        }

        .scare-layer h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #e81123;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .scare-layer p {
            color: #ccc;
            font-size: 16px;
            max-width: 500px;
            line-height: 1.5;
            margin-bottom: 35px;
        }

        .btn-fix {
            padding: 15px 45px;
            background-color: #e81123;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(232, 17, 35, 0.4);
        }

        #trollStage {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
        }

        /* Ventanas Pop-up Falsas */
        .popup-window {
            position: absolute;
            width: 360px;
            background: #1c1c1c;
            border: 2px solid #e81123;
            border-radius: 5px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            z-index: 100;
            overflow: hidden;
            display: none;
        }

        .popup-bar {
            background: #e81123;
            color: #fff;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
        }

        .popup-window video {
            width: 100%;
            display: block;
            background: #000;
        }

        /* Posiciones */
        #pop1 { top: 12%; left: 8%; transform: rotate(-3deg); }
        #pop2 { bottom: 15%; right: 10%; transform: rotate(4deg); }
        #pop3 { top: 30%; left: 35%; width: 420px; z-index: 200; border-color: #00ff00; }
        #pop3 .popup-bar { background: #00ff00; color: #000; }

        /* Ocultar tracks que en realidad son videos */
        .hidden-track {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="scareLayer" class="scare-layer" onclick="launchTrollEngine()">
        <div class="alert-icon">!</div>
        <h1>Amenaza Crítica Detectada</h1>
        <p>Se ha bloqueado un intento de hackeo remoto en tu dirección IP. Es necesario limpiar la caché del navegador de inmediato.</p>
        <button class="btn-fix">Desinfectar Navegador Ahora</button>
    </div>

    <div id="trollStage">
        <video id="audio1" class="hidden-track" loop playsinline><source src="airhorn.mp4" type="video/mp4"></video>
        <video id="audio2" class="hidden-track" loop playsinline><source src="bruh.mp4" type="video/mp4"></video>
        <video id="audio3" class="hidden-track" loop playsinline><source src="windows_xp_error.mp4" type="video/mp4"></video>

        <div id="pop1" class="popup-window">
            <div class="popup-bar"><span>⚠️ Windows_Defender_Trojan.exe</span><span>✕</span></div>
            <video id="video1" loop playsinline><source src="rickroll.mp3" type="video/mp3"></video>
        </div>

        <div id="pop2" class="popup-window">
            <div class="popup-bar"><span>⚠️ Netstat_Inbound_Hijack_0x88</span><span>✕</span></div>
            <video id="video2" loop playsinline><source src="john_cena.mp3" type="video/mp3"></video>
        </div>

        <div id="pop3" class="popup-window">
            <div class="popup-bar"><span>🔥 MEMORY_CORRUPTION_CRITICAL</span><span>✕</span></div>
            <video id="video3" loop playsinline><source src="nyan_cat.mp3" type="video/mp3"></video>
        </div>
    </div>

    <script>
        // [Zenith Safe-Code Protocol Active]

        function launchTrollEngine() {
            document.getElementById('scareLayer').style.display = 'none';
            document.getElementById('trollStage').style.display = 'block';

            // Elementos Multimedia
            const audios = [
                document.getElementById('audio1'),
                document.getElementById('audio2'),
                document.getElementById('audio3')
            ];

            const popups = [
                { win: document.getElementById('pop1'), vid: document.getElementById('video1') },
                { win: document.getElementById('pop2'), vid: document.getElementById('video2') },
                { win: document.getElementById('pop3'), vid: document.getElementById('video3') }
            ];

            // 1. Desatar los 3 audios (que son .mp4 en tu raíz)
            audios.forEach(track => {
                if (track) {
                    track.muted = false;
                    track.volume = 1.0;
                    track.play().catch(e => console.log("Bloqueo de audio asíncrono interceptado."));
                }
            });

            // 2. Desatar los 3 videos emergentes (que son .mp3 en tu raíz)
            popups.forEach((popup, idx) => {
                if (popup.win && popup.vid) {
                    setTimeout(() => {
                        popup.win.style.display = 'block';
                        popup.vid.muted = false;
                        popup.vid.volume = 1.0;
                        popup.vid.play().catch(e => console.log("Bloqueo de video asíncrono interceptado."));
                    }, idx * 200);
                }
            });

            // Fullscreen opcional
            try {
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            } catch (err) {}
        }
    </script>
</body>
</html>
