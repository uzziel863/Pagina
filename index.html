        .scare-layer {

            color: white;

            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(232, 17, 35, 0.6);
            margin-bottom: 25px;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); box-shadow: 0 0 50px rgba(232, 17, 35, 0.9); }
            100% { transform: scale(1); }
        }

        .scare-layer h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #e81123;
            text-transform: uppercase;
        }

        .scare-layer p {
            color: #ccc;
            font-size: 16px;
            max-width: 500px;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .btn-fix {
            padding: 15px 45px;
            background-color: #e81123;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(232, 17, 35, 0.4);
        }

        #trollStage {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
        }

        /* Estructura de Ventana Pop-up Falsa */
        .popup-window {
            position: absolute;
            width: 350px;
            background: #1c1c1c;
            border: 2px solid #e81123;
            border-radius: 5px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            z-index: 100;
            overflow: hidden;
            display: none;
        }

        .popup-bar {
            background: #e81123;
            color: #fff;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
        }

        .popup-window video {
            width: 100%;
            display: block;
            background: #000;
        }

        /* Posiciones */
        #pop1 { top: 12%; left: 5%; transform: rotate(-3deg); }
        #pop2 { bottom: 15%; right: 5%; transform: rotate(4deg); }
        #pop3 { top: 28%; left: 28%; width: 400px; z-index: 200; border-color: #00ff00; }
        #pop3 .popup-bar { background: #00ff00; color: #000; }
    </style>
